<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#67E8F9"/>
    </marker>
    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #A7F3D0; letter-spacing: 2px; }
      .boxTitle { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .boxText { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
      .smallText { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #94A3B8; }
      .done { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #86EFAC; }
      .todo { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #FDE68A; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="80" y="78" class="title">Explainable Retinal OCT Diagnosis Framework</text>
  <text x="80" y="112" class="subtitle">CNN classification, Grad-CAM transparency, perturbation robustness, pixel-level relevance mapping, and evaluation metrics</text>

  <text x="80" y="170" class="section">CORE PIPELINE</text>

  <rect x="80" y="210" rx="26" ry="26" width="240" height="120" fill="url(#card)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="255" class="boxTitle">Retinal OCT Dataset</text>
  <text x="110" y="290" class="boxText">CNV, DME, DRUSEN, NORMAL</text>

  <rect x="390" y="210" rx="26" ry="26" width="270" height="120" fill="url(#card)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="255" class="boxTitle">Preprocessing</text>
  <text x="420" y="290" class="boxText">Resize, normalize, split</text>

  <rect x="730" y="210" rx="26" ry="26" width="280" height="120" fill="url(#card)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="760" y="255" class="boxTitle">CNN Model</text>
  <text x="760" y="290" class="boxText">Disease classification model</text>

  <rect x="1080" y="210" rx="26" ry="26" width="280" height="120" fill="url(#card)" stroke="url(#accent)" stroke-width="3" filter="url(#shadow)"/>
  <text x="1110" y="255" class="boxTitle">Disease Prediction</text>
  <text x="1110" y="290" class="boxText">Final class output</text>

  <line x1="320" y1="270" x2="390" y2="270" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="660" y1="270" x2="730" y2="270" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1010" y1="270" x2="1080" y2="270" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="80" y="410" class="section">EXPLANATION AND VALIDATION MODULES</text>

  <rect x="110" y="450" rx="26" ry="26" width="280" height="140" fill="url(#card)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="495" class="boxTitle">Grad-CAM</text>
  <text x="140" y="530" class="boxText">Coarse visual explanation</text>
  <text x="140" y="560" class="smallText">Transparency module</text>

  <rect x="450" y="450" rx="26" ry="26" width="300" height="140" fill="url(#card)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="495" class="boxTitle">Perturbation Module</text>
  <text x="480" y="530" class="boxText">Gaussian noise, blur, occlusion</text>
  <text x="480" y="560" class="smallText">Robustness and stability testing</text>

  <rect x="810" y="450" rx="26" ry="26" width="300" height="140" fill="url(#card)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="840" y="495" class="boxTitle">Pixel-Level Relevance</text>
  <text x="840" y="530" class="boxText">LRP / NRP relevance mapping</text>
  <text x="840" y="560" class="smallText">Sharper explanation map</text>

  <rect x="1170" y="450" rx="26" ry="26" width="300" height="140" fill="url(#card)" stroke="url(#accent)" stroke-width="3" filter="url(#shadow)"/>
  <text x="1200" y="495" class="boxTitle">Evaluation Metrics</text>
  <text x="1200" y="530" class="boxText">Faithfulness, stability, localization</text>
  <text x="1200" y="560" class="smallText">Quantitative explanation quality</text>

  <line x1="870" y1="330" x2="870" y2="450" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="870" y1="330" x2="250" y2="450" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="870" y1="330" x2="600" y2="450" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="390" y1="520" x2="450" y2="520" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="520" x2="810" y2="520" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1110" y1="520" x2="1170" y2="520" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="80" y="670" class="section">INTERFACE OUTPUT</text>

  <rect x="420" y="710" rx="30" ry="30" width="760" height="150" fill="url(#card)" stroke="url(#accent)" stroke-width="3" filter="url(#shadow)"/>
  <text x="455" y="760" class="boxTitle">Desktop / Web Interface</text>
  <text x="455" y="798" class="boxText">Original OCT scan, disease prediction, Grad-CAM heatmap, relevance map, and explanation metrics</text>

  <line x1="1220" y1="330" x2="800" y2="710" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="250" y1="590" x2="610" y2="710" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="960" y1="590" x2="800" y2="710" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1320" y1="590" x2="990" y2="710" stroke="#67E8F9" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="80" y="910" class="done">Done:</text>
  <text x="145" y="910" class="smallText">CNN model, prediction pipeline, Grad-CAM visualization, project interface</text>
  <text x="80" y="940" class="todo">Next:</text>
  <text x="130" y="940" class="smallText">Formal perturbation experiments, LRP/NRP module, explanation metrics, comparative analysis</text>
</svg>
